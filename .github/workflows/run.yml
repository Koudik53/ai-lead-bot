name: Run AI Lead Generation

on:
  workflow_dispatch: # Yeh aapko GitHub par ek "Run" button dega
    inputs:
      niche:
        description: 'Target Niche (e.g., Gym, Real Estate)'
        required: true
        default: 'Gym'
      location:
        description: 'Target Location (e.g., Delhi, Mumbai)'
        required: true
        default: 'Delhi'
      max_leads:
        description: 'Kitne logo ko email bhejna hai? (Max limits)'
        required: true
        default: '2'

jobs:
  start-campaign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Magic Script
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          NICHE: ${{ github.event.inputs.niche }}
          LOCATION: ${{ github.event.inputs.location }}
          MAX_LEADS: ${{ github.event.inputs.max_leads }}
        run: node app.js
